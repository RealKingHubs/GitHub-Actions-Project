name: Deploy to AWS

on:
  push:
    branches: [main]

permissions:
  id-token: write   # ← Required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::715680702806:role/GitHub_OIDC
          aws-region: eu-west-1

      - name: Verify identity (sanity check)
        run: aws sts get-caller-identity

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://my-first-altschool-bucket --delete --exclude ".git/*" --exclude ".github/*"
